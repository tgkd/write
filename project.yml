name: Write
options:
  bundleIdPrefix: com.j.write
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.3"
  minimumXcodeGenVersion: "2.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
packages:
  SVGPath:
    url: https://github.com/nicklockwood/SVGPath
    from: "1.1.4"
targets:
  Write:
    type: application
    platform: iOS
    sources:
      - Write
    resources:
      - path: Write/Resources
        excludes:
          - "*.swift"
    settings:
      base:
        INFOPLIST_FILE: Write/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.j.write
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "2"
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ULU867Y7LC
        CODE_SIGN_IDENTITY: "iPhone Developer"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: false
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
    dependencies:
      - package: SVGPath
    info:
      path: Write/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: Write
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.education
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
  WriteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WriteTests
    resources:
      - path: Write/Resources/kanji_strokes.json
    dependencies:
      - target: Write
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
